<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      font-size: 2.3rem;
      margin-block: 20px;
      font-family: cursive;
      color: blue;
    }

    .main-container {
      width: 80%;
      display: flex;
      justify-self: center;
      height: auto;
      padding: 20px;
      flex-direction: column;
    }

    .input-section {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 10px;
      background-color: white;
    }

    .input-section input {
      width: 70%;
      height: 95%;
      font-size: 1.8rem;
      padding-left: 10px;
      font-weight: 600;
      color: blue;
      border: 1.3px solid blue;
    }

    .input-section input:focus {
      outline: 5px solid rgba(172, 172, 231, 0.833);
    }

    .input-section input::placeholder {
      color: blue;
    }

    .input-section button,
    li button {
      width: 20%;
      height: 100%;
      font-size: 1.8rem;
      color: blue;
      font-weight: 600;
      cursor: pointer;
      border: 1.3px solid blue;
    }

    .input-section button:hover,
    li button:hover {
      outline: 5px solid rgba(172, 172, 231, 0.833);
    }

    .todos-section {
      width: 100%;
    }

    ul {
      margin-block: 40px;
    }

    li {
      list-style: none;
      font-weight: 600;
      color: blue;
      font-size: 2rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      height: 60px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    li input[type="checkbox"] {
      width: 40px;
      height: 40px;
      margin-top: 10px;
      accent-color: rgb(16, 2, 99);
    }

    li span {
      width: 60%;
      height: 100%;
      display: flex;
      align-items: center;
      text-transform: uppercase;
    }

    .completed {
      text-decoration: line-through;
    }
  </style>

</head>

<body>

  <div class="root"></div>

  <script type="text/babel">

    function TodoApp() {

      let [input, setInput] = React.useState('');
      let [todos, setTodos] = React.useState([]);
      let [nextId, setNextId] = React.useState(1);

      function handleInput(ev) {
        setInput(ev.target.value);
      }

      function handleAddTodo() {
        if (!input.trim()) return;
        setTodos([...todos, { id: nextId, task: input, completed: false }]);
        setNextId(nextId + 1);
        setInput('');
      }

      function handleDelete(id) {
        setTodos(todos.filter(todo => todo.id !== id))
      }

      function handleCompleteTask(id) {
        setTodos(todos.map(todo => todo.id === id ? { ...todo, completed: !todo.completed } : todo));
      }

      return (<>
  
          <h2>TODO APP</h2>

          <div className="main-container">
            <div className="input-section">
              <input
                type="text"
                placeholder="Enter something..."
                value={input}
                onChange={handleInput}
                onKeyDown={(e) => {
                  if (e.key === "Enter") handleAddTodo();
                }}
              />
              <button onClick={handleAddTodo}>
                Add Todo
              </button>
            </div>

            <div className="todos-section">
              <ul>
                {todos.map(todo => (
                  <li key={todo.id}>
                    <input
                      type="checkbox"
                      checked={todo.completed}
                      onChange={() => handleCompleteTask(todo.id)}
                    />
                    <span className={todo.completed ? "completed" : ""}>
                      {todo.task}
                    </span>
                    <button onClick={() => handleDelete(todo.id)}>
                      Delete
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        
      </>);

    }

    ReactDOM.render(<TodoApp />, document.querySelector('.root'));

  </script>

</body>

</html>
