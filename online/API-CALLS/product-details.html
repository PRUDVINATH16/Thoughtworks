<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    p {
      margin-block: 10px;
    }

    .product-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle, white 30%, rgb(216, 162, 162) 90%);
      height: 100vh;
    }

    .product-container .img-container {
      width: 30%;
      height: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 5%
    }

    @keyframes spin {
      from {
        transform: rotate3d(0, 1, 0, 0deg) scale(1);
      }

      to {
        transform: rotate3d(0, 1, 0, 360deg) scale(1.3);
      }
    }

    .product-container img {
      width: 400px;
      height: 400px;
      animation: spin 10s ease-in-out infinite;
    }

    .details-container {
      width: 50%;
      height: 80%;
      display: flex;
      flex-direction: column;
      position: absolute;
      right: 5%;
      justify-content: space-evenly;
      font-size: 1.3rem;
    }

    .details-container span {
      color: rgb(173, 10, 10);
      font-weight: 600;
    }

    h2 {
      color: red;
    }

    button {
      width: 50%;
      height: 60px;
      display: flex;
      align-self: center;
      text-align: center;
      font-size: 1.7rem;
      align-items: center;
      justify-content: center;
      color: white;
      border: 1.9px solid rgb(255, 255, 255);
      border-radius: 15px;
      background-color: red;
      cursor: pointer;
      margin-block: 10px;
      margin-top: 30px;
      transition: all .4s;
    }

    button:hover {
      scale: 1.1;
    }

    .go-back {
      position: absolute;
      width: 180px;
      height: 50px;
      text-decoration: none;
      margin: 0 40px 0;
      padding: 10px;
    }

    .go-back button {
      border: none;
      font-size: 1.3rem;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 0, 0, 0.543);
    }

    /* ===== Responsive Only ===== */
    @media (max-width: 768px) {

      .product-container {
        flex-direction: column;
        height: auto;
        padding: 20px 0;
      }

      .product-container .img-container {
        position: static;
        width: 100%;
        height: auto;
        margin-bottom: 20px;
        padding-top: 30px;
      }

      .product-container img {
        width: 80%;
        height: auto;
      }

      .details-container {
        position: static;
        width: 90%;
        height: auto;
        font-size: 1rem;
        text-align: center;
        align-items: center;
      }

      button {
        width: 80%;
        height: 50px;
        font-size: 1.2rem;
      }

      .go-back {
        position: fixed;
        margin: 20px auto;
        display: block;
        text-align: center;
        margin: 0;
        left: 70px;
      }

      .go-back button {
        margin: 0;
      }
    }

    button:disabled {
      cursor: not-allowed;
    }
  </style>

</head>

<body>

  <a href="http-request.html" class="go-back"><button>Go Back</button></a>

  <div class="product-container">

  </div>

  <script>

    let params = new URLSearchParams(location.search)
    let id = params.get("id")

    async function fetchProduct() {

      let req = await fetch(`https://dummyjson.com/products/${id}`);
      let data = await req.json();

      let productHTML = `
        <div class="img-container">
          <img src=${data.thumbnail} alt=${data.title}/>  
        </div>
        <div class="details-container">
          <h2>${data.title}</h2>
          <p>${data.description}</p>
          <p style="text-decoration: line-through; font-size:1.5rem">Price: <span>₹ ${data.discountPercentage}</span></p>
          <p style="font-size:2rem">Discount Price: <span>₹ ${data.price}</span></p>
          <p>Avalability: <span>${data.availabilityStatus}</span></p>
          <p>Rating: <span>${data.rating}</span></p>
          <p>Return Policy: <span>${data.returnPolicy}</span></p>
          <p>Warranty Information: <span>${data.warrantyInformation}</span></p>
          <button class="add-to-cart" data-id="${data.id}">Add to Cart</button>
        </div>
      `;

      document.querySelector('.product-container').innerHTML = productHTML;

      document.querySelector('.add-to-cart').addEventListener('click', (ev) => {

        document.querySelector('.add-to-cart').textContent = 'Added';
        document.querySelector('.add-to-cart').disabled = true;
        setTimeout(() => {
          document.querySelector('.add-to-cart').textContent = 'Add to Cart';
          document.querySelector('.add-to-cart').disabled = false;
        }, 2000);

        let id = ev.target.dataset.id;

        let cart = JSON.parse(localStorage.getItem('cart')) || {};
       
        cart[id] = cart[id] ? cart[id]+1 : 1;

        localStorage.setItem('cart', JSON.stringify(cart));
      });
    }

    fetchProduct();
  </script>
</body>

</html>
